version: "3.9"

services:
  api:
    build: ./apps/api
    container_name: voxflow-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - voxflow-data:/app/data
      - voxflow-recordings:/app/recordings
    restart: unless-stopped
    # If you want to call out to a host-running Ollama:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  web:
    build: ./apps/web
    container_name: voxflow-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  voxflow-data:
  voxflow-recordings:
